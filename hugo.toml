baseURL = "https://joehwanghee.github.io/"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false
title = "Joe's Blog"
theme = "PaperMod"
paginate = 10

enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
pygmentsUseClasses = true

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  env = "production"
  author = "JoeHwangHee"
  mainSections = ["posts"]
  DateFormat = "2006-01-02"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/JoeHwangHee"

[languages.ko]
  label = "한국어"
  locale = "ko-KR"
  weight = 1
  title = "Joe's Blog"
  contentDir = "content/ko"

  [languages.ko.params]
    description = "Joe Hwang Hee의 개인 블로그입니다."

    [languages.ko.params.homeInfoParams]
      Title = "Hi there 👋"
      Content = "Joe Hwang Hee의 개발 블로그입니다."

  [[languages.ko.menu.main]]
    name = "개발기"
    identifier = "devlog"
    url = "posts/dev"
    weight = 1

  [[languages.ko.menu.main]]
    name = "Second Brain"
    parent = "devlog"
    url = "posts/dev/second-brain"
    weight = 1

  [[languages.ko.menu.main]]
